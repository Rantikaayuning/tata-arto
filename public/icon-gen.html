<!doctype html>
<html>
  <head>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        overflow: hidden;
      }
    </style>
  </head>

  <body>
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="500"
      height="500"
      viewBox="0 0 100 100"
      fill="none"
    >
      <defs>
        <linearGradient id="gradPrimary" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#434D8A" stop-opacity="1" />
          <stop offset="1" stop-color="#343B71" stop-opacity="1" />
        </linearGradient>

        <linearGradient id="gradAccent" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#6C91F5" stop-opacity="1" />
          <stop offset="1" stop-color="#4F7DF3" stop-opacity="1" />
        </linearGradient>

        <linearGradient id="gradHighlight" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#A5B4FC" stop-opacity="1" />
          <stop offset="1" stop-color="#818CF8" stop-opacity="1" />
        </linearGradient>
      </defs>

      <path
        d="M 20 50 Q 20 20, 50 20 L 50 50 Z"
        fill="url(#gradHighlight)"
        opacity="0.9"
        transform="rotate(180, 45, 45) translate(10, 10)"
      />

      <rect
        x="20"
        y="55"
        width="16"
        height="25"
        rx="8"
        fill="url(#gradPrimary)"
      />

      <rect
        x="42"
        y="35"
        width="16"
        height="45"
        rx="8"
        fill="url(#gradHighlight)"
      />

      <rect
        x="64"
        y="15"
        width="16"
        height="65"
        rx="8"
        fill="url(#gradAccent)"
      />

      <circle
        cx="50"
        cy="50"
        r="48"
        stroke="url(#gradPrimary)"
        stroke-width="4"
        stroke-dasharray="20, 10"
        stroke-linecap="round"
        transform="rotate(-45 50 50)"
        opacity="0.15"
      />
    </svg>
  </body>
</html>
